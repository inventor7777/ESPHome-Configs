esp32:
  variant: ESP32S3
  framework:
    type: esp-idf
  flash_size: 16MB
  cpu_frequency: 240MHZ
  
psram: # Configure PSRAM for camera use
  mode: octal
  speed: 80MHz

output:
  - platform: ledc # Output for the blue status LED
    pin: GPIO2
    id: status_led_out

i2c:
  - id: camera_i2c
    sda: GPIO4
    scl: GPIO5

button: # Button Actions
  - platform: template
    name: "Blink Status LED"
    id: blink_status_led
    icon: mdi:led-variant-outline
    on_press:
      then:
        - light.toggle: status_led
        - delay: 250ms
        - light.toggle: status_led
        - delay: 250ms
        - light.toggle: status_led
        - delay: 250ms
        - light.toggle: status_led
        
  - platform: template
    name: "Blink RGB LED"
    id: blink_rgb_led
    icon: mdi:led-variant-outline
    on_press:
      then:
        - light.toggle: rgb_led
        - delay: 250ms
        - light.toggle: rgb_led
        - delay: 250ms
        - light.toggle: rgb_led
        - delay: 250ms
        - light.toggle: rgb_led

  - platform: template
    name: "Pulse RGB LED"
    id: pulse_rgb_led
    icon: mdi:led-variant-outline
    on_press:
      then:
        - light.turn_on: 
            id: rgb_led
            brightness: 100%
            red: 100%
            green: 100%
            blue: 100%
            transition_length: 150ms
        - delay: 300ms
        - light.turn_off: 
            id: rgb_led
            transition_length: 1.5s
            
  - platform: template
    name: "Pulse Status LED"
    id: pulse_status_led
    icon: mdi:led-variant-outline
    on_press:
      then:
        - light.turn_on: 
            id: status_led
            brightness: 100%
            transition_length: 150ms
        - delay: 300ms
        - light.turn_off: 
            id: status_led
            transition_length: 1.5s

light:
  - platform: esp32_rmt_led_strip # Multicolor LED config
    chipset: ws2812
    rgb_order: GRB
    pin: GPIO48
    rmt_symbols: 48
    num_leds: 1
    default_transition_length: 0s
    name: "RGB LED"
    id: rgb_led
    restore_mode:
      RESTORE_DEFAULT_OFF
    effects: 
      - pulse: 
      - random: 
      - flicker: 
      - strobe:
      - lambda:
          name: Rainbow
          update_interval: 3s
          lambda: |-
            static int state = 0;
            auto call = id(rgb_led).make_call();
            call.set_transition_length(3000);
            call.set_state(true);  // Explicitly keep light ON

            if (state == 0) {
              call.set_rgb(1.0, 0.0, 0.0);  // Red
            } else if (state == 1) {
            call.set_rgb(0.0, 1.0, 0.0);  // Green
            } else if (state == 2) {
            call.set_rgb(0.0, 0.0, 1.0);  // Blue
            }

            call.perform();
            state = (state + 1) % 3; 
  - platform: monochromatic # Blue LED status light config
    name: "Status LED"
    output: status_led_out
    id: status_led
    default_transition_length: 0s
    restore_mode:
      RESTORE_DEFAULT_OFF
      
binary_sensor:
  - platform: gpio
    id: boot_button
    name: "Boot Button"
    pin:
      number: GPIO0
      mode: INPUT_PULLUP
      inverted: true